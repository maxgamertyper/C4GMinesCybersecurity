<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi</title>
    <link rel="stylesheet" href="bulma.min.css" />
</head>
<body>
   
    <div class="container my-3 px-3">
        <h1 class="title">Sushi</h1>
        </div>
    
     <div class="mx-auto">
            <p class="is-size-5 has-text-grey m-3 ">Phishing Detector Score</p>
            
            <div class="has-text-centered">
                <span id="phishing-score" class="tag is-small has-text-info mr-1">__</span>
                <span class="tag is-grey has-text-white">/ 100</span>
            </div>
        </div>
    
     <div class="custom-dark-box p-4 my-4">
            <p id="reasons" class="is-size-6 has-text-light mb-2">Reasons:</p>
        </div>

    <div class="custom-dark-box p-4 my-4">
            <p id="passed-tests" class="is-size-6 has-text-success mb-2">Passed Tests:</p>
        </div>

    <div class="custom-dark-box p-4 my-4">
            <p id="failed-tests" class="is-size-6 has-text-danger mb-2">Failed Tests:</p>
        </div>
    
    <div class="box has-text-centered m-3">
            <p id="yes-no" class="is-size-6 has-text-link mb-3">Does this seem accurate?</p>
            <div class="is-flex is-justify-content-space-between">
                    <button id="yes" class="button is-success" style="width: 48%;">Safe</button>
                    <button id="no" class="button is-danger" style="width: 48%;">Phishing</button>
                        </div>
        </div>

</body>
</html>
